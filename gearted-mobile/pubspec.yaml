name: gearted
description: Marketplace pour l'échange d'équipements Airsoft

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  go_router: ^12.0.0
  flutter_riverpod: ^2.4.0
  dio: ^5.3.0
  shared_preferences: ^2.2.0
  image_picker: ^0.8.7+3
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.7
  intl: ^0.18.1
  # Temporarily comment out Firebase to test basic functionality
  # firebase_core: ^2.15.0
  # firebase_auth: ^4.7.2
  # cloud_firestore: ^4.8.4
  # firebase_storage: ^11.2.5
  flutter_dotenv: ^5.1.0
  google_sign_in: ^6.3.0
  flutter_facebook_auth: ^6.0.4
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env
