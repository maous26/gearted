version: '3.8'

services:
  # Base de données PostgreSQL
  postgres:
    image: postgres:latest
    container_name: gearted-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: gearted
      POSTGRES_PASSWORD: gearted_password
      POSTGRES_DB: gearted
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - gearted-network

  # Redis pour le cache et les sessions
  redis:
    image: redis:latest
    container_name: gearted-redis
    ports:
      - "6379:6379"
    networks:
      - gearted-network

  # Backend API
  api:
    build:
      context: ../gearted-backend
      dockerfile: Dockerfile.dev
    container_name: gearted-api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: gearted
      DB_PASSWORD: gearted_password
      DB_NAME: gearted
      REDIS_URL: redis://redis:6379
    volumes:
      - ../gearted-backend:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis
    networks:
      - gearted-network

networks:
  gearted-network:
    driver: bridge

volumes:
  postgres-data:
